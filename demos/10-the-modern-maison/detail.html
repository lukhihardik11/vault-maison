<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Product — Vault Maison</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/maison.css">
<style>
.detail-page{padding:100px 48px 80px}
.back{color:var(--sand);text-decoration:none;font-size:12px;letter-spacing:2px;display:inline-block;margin-bottom:24px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px}
.img-wrap{position:sticky;top:100px}
.img-wrap img{width:100%;height:500px;object-fit:cover;display:block}
.img-thumbs{display:flex;gap:8px;margin-top:8px}
.img-thumbs button{width:60px;height:60px;border:1px solid rgba(139,115,85,0.2);background:none;cursor:pointer;overflow:hidden;transition:border-color 0.3s}
.img-thumbs button:hover,.img-thumbs button.active{border-color:var(--sand)}
.img-thumbs button img{width:100%;height:100%;object-fit:cover}
.info h1{font-family:var(--heading);font-size:32px}
.info .desc{font-size:14px;color:var(--warm-gray);line-height:1.8;margin-top:16px}
.info table{width:100%;margin-top:24px;border-collapse:collapse}
.info td{padding:10px 0;font-size:13px;border-bottom:1px solid rgba(139,115,85,0.1)}
.info td:first-child{color:var(--warm-gray);width:40%}
.info .price{font-family:var(--heading);font-size:28px;color:var(--sand);margin-top:24px}
.info .acquire{display:block;width:100%;margin-top:20px;padding:16px;background:var(--sand);color:white;border:none;font-family:var(--body);font-size:14px;letter-spacing:1px;cursor:pointer;text-align:center;transition:opacity 0.3s}
.info .acquire:hover{opacity:0.85}
.info .guarantee{font-size:12px;color:var(--warm-gray);margin-top:16px;line-height:1.7}
@media(max-width:768px){.detail-grid{grid-template-columns:1fr}.img-wrap{position:static}.img-wrap img{height:350px}.detail-page{padding:80px 24px 40px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">VAULT MAISON</a>
<div class="nav-links"><a href="listing.html">Collection</a><a href="index.html">Maison</a></div></nav>
<div class="detail-page">
<a href="listing.html" class="back">← Back to Collection</a>
<div class="detail-grid">
<div class="img-wrap"><img id="mainImg" src="" alt="">
<div class="img-thumbs" id="thumbs"></div></div>
<div class="info" id="infoPanel"></div>
</div></div>
<footer class="footer"><p>© 2026 Vault Maison</p></footer>
<script>
const pid=new URLSearchParams(window.location.search).get('id')||'vm-001';
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const p=products.find(x=>x.id===pid)||products[0];
const mainImg=document.getElementById('mainImg');
mainImg.src=p.image;
const thumbs=document.getElementById('thumbs');
[p.image,p.imageAlt].forEach((src,i)=>{
const btn=document.createElement('button');if(i===0)btn.classList.add('active');
btn.innerHTML=`<img src="${src}" alt="View ${i+1}">`;
btn.addEventListener('click',()=>{mainImg.src=src;thumbs.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')});
thumbs.appendChild(btn)});
document.getElementById('infoPanel').innerHTML=`
<h1>${p.name}</h1>
<p class="desc">${p.description}</p>
<table><tr><td>Shape</td><td>${p.shape}</td></tr><tr><td>Carat</td><td>${p.carat}ct</td></tr><tr><td>Color</td><td>${p.color}</td></tr><tr><td>Clarity</td><td>${p.clarity}</td></tr><tr><td>Cut</td><td>${p.cut}</td></tr><tr><td>Origin</td><td>${p.origin}</td></tr><tr><td>Certification</td><td>${p.certified} — ${p.certNumber}</td></tr></table>
<div class="price">$${p.price.toLocaleString()}</div>
<button class="acquire" onclick="alert('Your acquisition request has been received. A Vault Maison advisor will contact you within 24 hours.')">Acquire This Piece</button>
<p class="guarantee">Every purchase includes GIA certification, insured white-glove delivery, and our 30-day authenticity guarantee.</p>`;
})
</script></body></html>
