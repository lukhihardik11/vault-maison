<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Detail — The Gallery</title>
  <link rel="stylesheet" href="../shared/css/luxury-foundation.css">
  <link rel="stylesheet" href="css/gallery.css">
</head>
<body>
  <div class="scroll-progress"></div>
  <nav class="luxury-nav">
    <a href="index.html" class="nav-logo">The Gallery</a>
    <div class="nav-links">
      <a href="listing.html">Collection</a>
      <a href="#">Exhibitions</a>
      <a href="#">About</a>
      <a href="#">Visit</a>
    </div>
  </nav>

  <div class="detail-layout">
    <div class="detail-image-col">
      <img id="detailImage" class="detail-main-image" src="" alt="Work">
    </div>
    <div class="detail-info-col">
      <div class="detail-breadcrumb"><a href="index.html">Gallery</a> / <a href="listing.html">Collection</a> / <span id="detailBreadcrumb">Work</span></div>
      <h1 class="detail-title" id="detailTitle"></h1>
      <p class="detail-subtitle" id="detailSubtitle"></p>
      <p class="detail-price" id="detailPrice"></p>
      <p class="detail-description" id="detailDesc"></p>
      <div class="detail-specs" id="detailSpecs"></div>
      <a href="#" class="detail-cta" onclick="alert('Acquisition inquiry submitted. Our curator will contact you within 24 hours.'); return false;">Inquire About This Work</a>
    </div>
  </div>

  <footer class="gallery-footer">
    <p class="footer-text">The Gallery &mdash; Vault Maison</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../shared/js/luxury-animations.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
