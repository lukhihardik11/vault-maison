<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Artwork — Vault Maison Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/gallery.css">
<style>
.detail-page{padding:100px 0 0}
.detail-image{width:80vw;margin:0 auto;overflow:hidden}
.detail-image img{width:100%;height:60vh;object-fit:cover;display:block}
.detail-label{max-width:600px;margin:40px auto 80px;padding:0 24px;text-align:center}
.detail-label h1{font-size:32px;font-weight:400;letter-spacing:1px}
.detail-label .desc{font-size:15px;line-height:2;color:var(--warm-gray);margin-top:20px;font-style:italic}
.detail-label .specs{font-family:var(--sans);font-size:12px;color:var(--warm-gray);margin-top:24px;line-height:2;letter-spacing:1px}
.detail-label .price{font-size:24px;color:var(--accent);margin-top:24px}
.detail-label .acquire{display:inline-block;margin-top:24px;font-family:var(--sans);font-size:13px;color:var(--accent);text-decoration:none;letter-spacing:2px;border-bottom:1px solid var(--accent);padding-bottom:4px;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none}
.back{display:inline-block;padding:24px 60px;font-family:var(--sans);font-size:12px;color:var(--warm-gray);text-decoration:none;letter-spacing:2px}
@media(max-width:768px){.detail-image{width:100%}.detail-image img{height:40vh}.detail-label{padding:0 24px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">Vault Maison</a>
<div class="nav-links"><a href="listing.html">Exhibition</a><a href="index.html">Home</a></div></nav>
<a href="listing.html" class="back">← Back to Exhibition</a>
<div class="detail-page">
<div class="detail-image"><img id="mainImg" src="" alt=""></div>
<div class="detail-label" id="label"></div>
</div>
<footer class="footer"><p>© 2026 Vault Maison Gallery</p></footer>
<script>
const pid=new URLSearchParams(window.location.search).get('id')||'vm-001';
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const p=products.find(x=>x.id===pid)||products[0];
document.getElementById('mainImg').src=p.image;
document.getElementById('label').innerHTML=`
<h1>${p.name}</h1>
<p class="desc">${p.description}</p>
<div class="specs">${p.shape} · ${p.carat} carats · Color ${p.color} · Clarity ${p.clarity}<br>Cut: ${p.cut} · Origin: ${p.origin} · ${p.certified} ${p.certNumber}</div>
<div class="price">$${p.price.toLocaleString()}</div>
<button class="acquire" onclick="alert('Acquisition inquiry submitted. Our curator will be in touch.')">Acquire</button>`;
})
</script></body></html>
