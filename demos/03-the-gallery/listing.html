<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Exhibition — Vault Maison Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/gallery.css">
<style>
.listing-header{padding:140px 60px 40px;text-align:center}
.listing-header h1{font-size:42px;font-weight:400;font-style:italic}
.listing-header p{font-family:var(--sans);color:var(--warm-gray);font-size:13px;margin-top:12px}
.gallery-grid{columns:2;column-gap:24px;padding:0 60px 80px}
.gallery-item{break-inside:avoid;margin-bottom:24px;cursor:pointer;position:relative;overflow:hidden}
.gallery-item img{width:100%;display:block;transition:transform 0.6s ease}
.gallery-item:hover img{transform:scale(1.03)}
.gallery-item .overlay{position:absolute;bottom:0;left:0;right:0;padding:24px;background:linear-gradient(transparent,rgba(42,42,42,0.9));opacity:0;transition:opacity 0.4s}
.gallery-item:hover .overlay{opacity:1}
.overlay h3{font-size:18px;color:var(--cream);font-weight:400}
.overlay .meta{font-family:var(--sans);font-size:11px;color:rgba(253,251,247,0.7);margin-top:6px}
.overlay .price{font-size:16px;color:var(--accent);margin-top:8px}
@media(max-width:768px){.gallery-grid{columns:1;padding:0 24px 40px}.listing-header{padding:100px 24px 24px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">Vault Maison</a>
<div class="nav-links"><a href="listing.html">Exhibition</a><a href="index.html">Home</a></div></nav>
<div class="listing-header"><h1>Current Exhibition</h1><p>Hover to reveal. Click to contemplate.</p></div>
<div class="gallery-grid" id="galleryGrid"></div>
<footer class="footer"><p>© 2026 Vault Maison Gallery</p></footer>
<script>
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const grid=document.getElementById('galleryGrid');
products.forEach(p=>{
const item=document.createElement('a');item.href='detail.html?id='+p.id;item.className='gallery-item';item.style.textDecoration='none';
const heights=['300px','400px','350px','450px','320px','380px'];
const h=heights[Math.floor(Math.random()*heights.length)];
item.innerHTML=`<img src="${p.image}" alt="${p.name}" style="height:${h};object-fit:cover">
<div class="overlay"><h3>${p.name}</h3><div class="meta">${p.shape} · ${p.carat}ct</div><div class="price">$${p.price.toLocaleString()}</div></div>`;
grid.appendChild(item)})})
</script></body></html>
