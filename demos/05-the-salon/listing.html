<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Collection — Vault Maison Salon</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/salon.css">
<style>
.listing-header{padding:120px 48px 40px}
.listing-header h1{font-size:32px;font-weight:400}
.listing-header p{color:var(--dim);font-size:13px;margin-top:8px;font-family:var(--body)}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding:0 48px 80px}
.rec-card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.05);transition:transform 0.3s,box-shadow 0.3s;text-decoration:none;color:inherit;display:block}
.rec-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.rec-bubble{padding:12px 20px;font-family:var(--body);font-size:12px;color:var(--sage);font-style:italic;background:rgba(74,93,35,0.05);border-bottom:1px solid rgba(74,93,35,0.1)}
.rec-card img{width:100%;height:240px;object-fit:cover}
.rec-card .info{padding:16px 20px}
.rec-card h3{font-size:18px;font-weight:400}
.rec-card .meta{font-family:var(--body);font-size:12px;color:var(--dim);margin-top:6px}
.rec-card .price{color:var(--sage);font-size:18px;margin-top:8px}
@media(max-width:768px){.rec-grid{grid-template-columns:1fr;padding:0 24px 40px}.listing-header{padding:100px 24px 24px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">Vault Maison</a>
<div class="nav-links"><a href="listing.html">Collection</a><a href="index.html">Home</a></div></nav>
<div class="listing-header"><h1>Curated for You</h1><p>Your advisor's recommendations, based on your preferences</p></div>
<div class="rec-grid" id="recGrid"></div>
<footer class="footer"><p>© 2026 Vault Maison Salon</p></footer>
<script>
const bubbles=['Selected for its exceptional fire and brilliance...','A rare find — perfect for a statement piece...','This stone has remarkable clarity for its size...','An excellent value with outstanding light performance...','Handpicked from our latest acquisition...'];
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const grid=document.getElementById('recGrid');
products.forEach((p,i)=>{
const card=document.createElement('a');card.href='detail.html?id='+p.id;card.className='rec-card';
card.innerHTML=`<div class="rec-bubble">"${bubbles[i%bubbles.length]}"</div><img src="${p.image}" alt="${p.name}"><div class="info"><h3>${p.name}</h3><div class="meta">${p.shape} · ${p.carat}ct · ${p.color}/${p.clarity}</div><div class="price">$${p.price.toLocaleString()}</div></div>`;
grid.appendChild(card)})})
</script></body></html>
