<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lot Detail — Marketplace of Rarity</title>
  <link rel="stylesheet" href="../shared/css/luxury-foundation.css">
  <link rel="stylesheet" href="css/marketplace.css">
</head>
<body>
  <div class="scroll-progress"></div>
  <nav class="luxury-nav">
    <a href="index.html" class="nav-logo">Vault Maison</a>
    <div class="nav-links">
      <a href="listing.html">All Lots</a>
    </div>
  </nav>
  <div class="detail-layout">
    <div class="detail-image-col">
      <img id="detailImage" class="detail-main-image" src="" alt="Lot">
    </div>
    <div class="detail-info-col">
      <div class="detail-breadcrumb"><a href="index.html">Marketplace</a> / <a href="listing.html">All Lots</a> / <span id="detailBreadcrumb"></span></div>
      <div class="detail-lot-badge" id="lotBadge"></div>
      <h1 class="detail-title" id="detailTitle"></h1>
      <p class="detail-subtitle" id="detailSubtitle"></p>
      <div class="detail-bid-section">
        <div class="bid-current-label">Current Bid</div>
        <div class="bid-current-amount" id="bidAmount"></div>
        <div class="bid-history" id="bidHistory"></div>
      </div>
      <p class="detail-description" id="detailDesc"></p>
      <div class="detail-specs" id="detailSpecs"></div>
      <button class="detail-cta" id="detailCta" onclick="alert('Bid registered. You will receive confirmation via email within 60 seconds.');">Place Bid</button>
    </div>
  </div>
  <footer class="mkt-footer"><p class="footer-text">The Marketplace of Rarity &mdash; Vault Maison</p></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="../shared/js/luxury-animations.js"></script>
  <script src="js/marketplace.js"></script>
</body>
</html>
