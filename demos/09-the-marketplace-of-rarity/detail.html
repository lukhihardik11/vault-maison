<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lot Detail — Vault Maison Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/marketplace.css">
<style>
.detail-page{padding:100px 40px 80px}
.back{color:var(--crimson);text-decoration:none;font-size:12px;letter-spacing:2px;display:inline-block;margin-bottom:24px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.img-panel{position:sticky;top:100px}
.img-panel img{width:100%;height:450px;object-fit:cover;border:1px solid rgba(255,59,48,0.15)}
.bid-history{margin-top:16px;padding:12px;background:rgba(255,59,48,0.05);border:1px solid rgba(255,59,48,0.1)}
.bid-history h4{font-size:12px;letter-spacing:2px;color:var(--crimson);margin-bottom:8px}
.bid-entry{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--dim)}
.info-panel .lot-num{font-size:11px;color:var(--crimson);letter-spacing:2px;font-weight:600}
.info-panel h1{font-size:28px;margin-top:8px;font-weight:600}
.info-panel .desc{font-size:13px;color:var(--dim);line-height:1.7;margin-top:12px}
.info-panel table{width:100%;margin-top:16px;border-collapse:collapse}
.info-panel td{padding:8px 0;font-size:12px;border-bottom:1px solid rgba(255,59,48,0.08)}
.info-panel td:first-child{color:var(--dim)}
.info-panel td:last-child{color:var(--crimson);text-align:right}
.current-bid{margin-top:24px;padding:20px;background:rgba(255,59,48,0.1);border:2px solid var(--crimson)}
.current-bid .label{font-size:11px;letter-spacing:2px;color:var(--dim)}
.current-bid .amount{font-size:32px;font-weight:700;color:var(--crimson);margin-top:4px}
.bid-btn{display:block;width:100%;margin-top:16px;padding:16px;background:var(--crimson);color:white;border:none;font-family:var(--font);font-size:14px;letter-spacing:2px;font-weight:600;cursor:pointer;transition:opacity 0.3s}
.bid-btn:hover{opacity:0.85}
@media(max-width:768px){.detail-grid{grid-template-columns:1fr}.img-panel{position:static}.detail-page{padding:80px 20px 40px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">VAULT MAISON</a>
<div class="nav-links"><a href="listing.html">Auction Floor</a><a href="index.html">Home</a></div></nav>
<div class="detail-page">
<a href="listing.html" class="back">← Back to Auction Floor</a>
<div class="detail-grid">
<div class="img-panel"><img id="mainImg" src="" alt="">
<div class="bid-history"><h4>BID HISTORY</h4>
<div class="bid-entry"><span>Bidder ***42</span><span>2 min ago</span></div>
<div class="bid-entry"><span>Bidder ***87</span><span>5 min ago</span></div>
<div class="bid-entry"><span>Bidder ***15</span><span>12 min ago</span></div>
</div></div>
<div class="info-panel" id="infoPanel"></div>
</div></div>
<footer class="footer"><p>© 2026 Vault Maison Marketplace</p></footer>
<script>
const pid=new URLSearchParams(window.location.search).get('id')||'vm-001';
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const p=products.find(x=>x.id===pid)||products[0];
document.getElementById('mainImg').src=p.image;
const bidPrice=Math.round(p.price*1.15);
document.getElementById('infoPanel').innerHTML=`
<div class="lot-num">${p.lotNumber}</div>
<h1>${p.name}</h1>
<p class="desc">${p.description}</p>
<table><tr><td>Shape</td><td>${p.shape}</td></tr><tr><td>Carat</td><td>${p.carat}ct</td></tr><tr><td>Color</td><td>${p.color}</td></tr><tr><td>Clarity</td><td>${p.clarity}</td></tr><tr><td>Cut</td><td>${p.cut}</td></tr><tr><td>Origin</td><td>${p.origin}</td></tr><tr><td>Cert</td><td>${p.certNumber}</td></tr></table>
<div class="current-bid"><div class="label">CURRENT BID</div><div class="amount">$${bidPrice.toLocaleString()}</div></div>
<button class="bid-btn" onclick="alert('Bid placed! You are now the highest bidder at $${(bidPrice+Math.round(p.price*0.05)).toLocaleString()}')">PLACE BID — $${(bidPrice+Math.round(p.price*0.05)).toLocaleString()}</button>`;
})
</script></body></html>
