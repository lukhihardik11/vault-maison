<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specimen Index — The Observatory</title>
  <link rel="stylesheet" href="../shared/css/luxury-foundation.css">
  <link rel="stylesheet" href="css/observatory.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="scroll-progress"></div>
  <nav class="luxury-nav">
    <a href="index.html" class="nav-logo">Observatory</a>
    <div class="nav-links">
      <a href="listing.html">Analysis</a>
      <a href="#">Research</a>
      <a href="#">Methodology</a>
      <a href="#">Contact</a>
    </div>
  </nav>
  <section class="listing-hero">
    <div>
      <div class="hero-overline">Specimen Index</div>
      <h1 class="spectral-title">All Specimens Under Analysis</h1>
    </div>
  </section>
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="round">Round</button>
    <button class="filter-btn" data-filter="emerald">Emerald</button>
    <button class="filter-btn" data-filter="oval">Oval</button>
    <button class="filter-btn" data-filter="cushion">Cushion</button>
    <button class="filter-btn" data-filter="princess">Princess</button>
    <button class="filter-btn" data-filter="pear">Pear</button>
  </div>
  <div class="product-grid" id="listingGrid" style="padding: var(--space-xl) var(--space-lg);"></div>
  <footer class="obs-footer"><p class="footer-text">The Observatory &mdash; Vault Maison</p></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../shared/js/luxury-animations.js"></script>
  <script src="js/observatory.js"></script>
</body>
</html>
