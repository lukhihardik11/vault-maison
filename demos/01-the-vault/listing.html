<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — Vault Maison</title>
  <link rel="stylesheet" href="../shared/css/luxury-foundation.css">
  <link rel="stylesheet" href="css/vault.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="scroll-progress"></div>

  <nav class="luxury-nav">
    <a href="index.html" class="nav-logo">Vault Maison</a>
    <div class="nav-links">
      <a href="listing.html">Collection</a>
      <a href="#">Heritage</a>
      <a href="#">Atelier</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="listing-hero">
    <div>
      <div class="section-overline">The Collection</div>
      <h1 class="section-title">Stones Under Guard</h1>
    </div>
  </section>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="round brilliant">Round</button>
    <button class="filter-btn" data-filter="emerald">Emerald</button>
    <button class="filter-btn" data-filter="oval">Oval</button>
    <button class="filter-btn" data-filter="cushion">Cushion</button>
    <button class="filter-btn" data-filter="princess">Princess</button>
    <button class="filter-btn" data-filter="pear">Pear</button>
  </div>

  <div class="listing-grid" id="listingGrid"></div>

  <footer class="vault-footer">
    <p class="footer-text">Vault Maison &mdash; By Appointment Only</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../shared/js/luxury-animations.js"></script>
  <script src="js/vault.js"></script>

</html>
