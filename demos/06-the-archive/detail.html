<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dossier — Vault Maison Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/archive.css">
<style>
.detail-page{padding:100px 0 80px}
.detail-image{width:100%;height:60vh;overflow:hidden}
.detail-image img{width:100%;height:100%;object-fit:cover}
.timeline-bar{display:flex;justify-content:center;gap:0;padding:32px 48px;border-bottom:1px solid rgba(212,165,116,0.15)}
.tl-node{display:flex;align-items:center;gap:0;cursor:pointer}
.tl-node .dot{width:12px;height:12px;background:var(--brass);border-radius:50%;transition:transform 0.3s}
.tl-node:hover .dot{transform:scale(1.5)}
.tl-node .lbl{font-size:11px;letter-spacing:1px;color:var(--dim);margin-left:8px;margin-right:24px}
.tl-node.active .dot{background:var(--steel)}
.tl-node.active .lbl{color:var(--brass)}
.tl-connector{width:40px;height:1px;background:rgba(212,165,116,0.3)}
.dossier{max-width:700px;margin:40px auto;padding:0 24px}
.dossier .lot{font-size:10px;letter-spacing:3px;color:var(--dim)}
.dossier h1{font-family:var(--heading);font-size:32px;color:var(--brass);margin-top:8px;font-weight:400}
.dossier .desc{font-size:15px;line-height:1.9;color:var(--dim);margin-top:20px}
.dossier table{width:100%;margin-top:24px;border-collapse:collapse}
.dossier td{padding:10px 0;font-size:13px;border-bottom:1px solid rgba(212,165,116,0.08)}
.dossier td:first-child{color:var(--dim);width:40%}
.dossier td:last-child{color:var(--brass)}
.dossier .price{font-size:28px;color:var(--brass);margin-top:24px}
.dossier .acquire{display:inline-block;margin-top:20px;padding:14px 40px;border:1px solid var(--brass);color:var(--brass);text-decoration:none;font-size:12px;letter-spacing:2px;transition:background 0.3s,color 0.3s;cursor:pointer;background:none}
.dossier .acquire:hover{background:var(--brass);color:var(--mahogany)}
.back{display:inline-block;padding:0 48px;color:var(--brass);text-decoration:none;font-size:12px;letter-spacing:2px;margin-bottom:16px}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">VAULT MAISON <span class="sub">ARCHIVE</span></a>
<div class="nav-links"><a href="listing.html">Catalog</a><a href="index.html">Home</a></div></nav>
<div class="detail-page">
<a href="listing.html" class="back">← Back to Catalog</a>
<div class="detail-image"><img id="mainImg" src="" alt=""></div>
<div class="timeline-bar">
<div class="tl-node active"><div class="dot"></div><div class="lbl">Origin</div></div>
<div class="tl-connector"></div>
<div class="tl-node"><div class="dot"></div><div class="lbl">Cutting</div></div>
<div class="tl-connector"></div>
<div class="tl-node"><div class="dot"></div><div class="lbl">Grading</div></div>
<div class="tl-connector"></div>
<div class="tl-node"><div class="dot"></div><div class="lbl">Certification</div></div>
<div class="tl-connector"></div>
<div class="tl-node"><div class="dot"></div><div class="lbl">Vault</div></div>
</div>
<div class="dossier" id="dossier"></div>
</div>
<footer class="footer"><p>© 2026 Vault Maison Archive</p></footer>
<script>
const nodes=document.querySelectorAll('.tl-node');
nodes.forEach(n=>n.addEventListener('click',()=>{nodes.forEach(x=>x.classList.remove('active'));n.classList.add('active')}));
const pid=new URLSearchParams(window.location.search).get('id')||'vm-001';
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const p=products.find(x=>x.id===pid)||products[0];
document.getElementById('mainImg').src=p.image;
document.getElementById('dossier').innerHTML=`
<div class="lot">${p.lotNumber} · ${p.certified}</div>
<h1>${p.name}</h1>
<p class="desc">${p.description}</p>
<table><tr><td>Shape</td><td>${p.shape}</td></tr><tr><td>Carat</td><td>${p.carat}ct</td></tr><tr><td>Color</td><td>${p.color}</td></tr><tr><td>Clarity</td><td>${p.clarity}</td></tr><tr><td>Cut</td><td>${p.cut}</td></tr><tr><td>Origin</td><td>${p.origin}</td></tr><tr><td>Date Archived</td><td>${p.dateArchived}</td></tr><tr><td>Certificate</td><td>${p.certNumber}</td></tr></table>
<div class="price">$${p.price.toLocaleString()}</div>
<button class="acquire" onclick="alert('Acquisition terms prepared. Please check your email for the dossier.')">Acquire This Piece</button>`;
})
</script></body></html>
