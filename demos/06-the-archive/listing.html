<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Catalog — Vault Maison Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/archive.css">
<style>
.catalog-header{padding:120px 48px 40px}
.catalog-header h1{font-family:var(--heading);font-size:32px;color:var(--brass);font-weight:400}
.catalog-header p{color:var(--dim);font-size:12px;margin-top:8px;letter-spacing:1px}
.catalog-list{padding:0 48px 80px}
.catalog-entry{display:grid;grid-template-columns:80px 1fr 120px 120px 100px;gap:24px;align-items:center;padding:20px 0;border-bottom:1px solid rgba(212,165,116,0.1);cursor:pointer;transition:background 0.3s;text-decoration:none;color:var(--text)}
.catalog-entry:hover{background:rgba(212,165,116,0.05)}
.catalog-entry .lot{font-size:11px;letter-spacing:2px;color:var(--brass)}
.catalog-entry .name{font-family:var(--heading);font-size:16px}
.catalog-entry .origin{font-size:12px;color:var(--dim)}
.catalog-entry .date{font-size:12px;color:var(--dim)}
.catalog-entry .price{font-size:16px;color:var(--brass);text-align:right}
.scrub-bar{position:fixed;bottom:0;left:0;right:0;height:48px;background:var(--near-black);border-top:1px solid rgba(212,165,116,0.2);display:flex;align-items:center;padding:0 48px;z-index:100}
.scrub-bar .label{font-size:10px;letter-spacing:2px;color:var(--dim);margin-right:16px}
.scrub-track{flex:1;height:4px;background:rgba(212,165,116,0.2);border-radius:2px;position:relative;cursor:pointer}
.scrub-thumb{width:16px;height:16px;background:var(--brass);border-radius:50%;position:absolute;top:-6px;left:0;cursor:grab;transition:left 0.1s}
.scrub-stage{font-size:11px;color:var(--brass);margin-left:16px;min-width:100px}
@media(max-width:768px){.catalog-entry{grid-template-columns:1fr;gap:4px}.catalog-header{padding:100px 24px 24px}.catalog-list{padding:0 24px 80px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">VAULT MAISON <span class="sub">ARCHIVE</span></a>
<div class="nav-links"><a href="listing.html">Catalog</a><a href="index.html">Home</a></div></nav>
<div class="catalog-header"><h1>The Catalog</h1><p>Sorted by date archived. Drag the timeline scrub bar to explore provenance stages.</p></div>
<div class="catalog-list" id="catalogList"></div>
<div class="scrub-bar">
<span class="label">TIMELINE</span>
<div class="scrub-track" id="scrubTrack"><div class="scrub-thumb" id="scrubThumb"></div></div>
<span class="scrub-stage" id="scrubStage">Origin</span>
</div>
<footer class="footer" style="margin-bottom:48px"><p>© 2026 Vault Maison Archive</p></footer>
<script>
const stages=['Origin','Cutting','Grading','Certification','Vault'];
const thumb=document.getElementById('scrubThumb');
const track=document.getElementById('scrubTrack');
const stageLabel=document.getElementById('scrubStage');
let dragging=false;
track.addEventListener('mousedown',e=>{dragging=true;updateThumb(e)});
document.addEventListener('mousemove',e=>{if(dragging)updateThumb(e)});
document.addEventListener('mouseup',()=>{dragging=false});
function updateThumb(e){const rect=track.getBoundingClientRect();let x=Math.max(0,Math.min(e.clientX-rect.left,rect.width));const pct=x/rect.width;thumb.style.left=x+'px';const idx=Math.min(Math.floor(pct*stages.length),stages.length-1);stageLabel.textContent=stages[idx]}
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const list=document.getElementById('catalogList');
products.forEach(p=>{
const entry=document.createElement('a');entry.href='detail.html?id='+p.id;entry.className='catalog-entry';
entry.innerHTML=`<span class="lot">${p.lotNumber}</span><span class="name">${p.name}</span><span class="origin">${p.origin}</span><span class="date">${p.dateArchived}</span><span class="price">$${p.price.toLocaleString()}</span>`;
list.appendChild(entry)})})
</script></body></html>
