<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vault Maison</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-snap-type:y mandatory;overflow-y:scroll}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#FFFFFF;color:#050505}
.product-screen{height:100vh;scroll-snap-align:start;position:relative}
.product-screen img{width:100vw;height:100vh;object-fit:cover}
.product-name{position:absolute;bottom:24px;left:24px;font-size:14px;letter-spacing:2px}
.product-price{position:absolute;bottom:24px;right:24px;font-size:14px;letter-spacing:1px}
a{color:#050505;text-decoration:none}
.back{position:fixed;top:16px;left:16px;font-size:14px;letter-spacing:2px;z-index:10;mix-blend-mode:difference;color:white}
</style></head><body>
<a href="index.html" class="back">Vault Maison</a>
<div id="products"></div>
<script>
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const c=document.getElementById('products');
products.forEach(p=>{
const s=document.createElement('a');s.href='detail.html?id='+p.id;s.className='product-screen';
s.innerHTML=`<img src="${p.image}" alt="${p.name}"><div class="product-name">${p.name}</div><div class="product-price">$${p.price.toLocaleString()}</div>`;
c.appendChild(s)})})
</script></body></html>
