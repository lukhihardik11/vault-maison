<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Commission — Vault Maison Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/atelier.css">
<style>
.detail-page{padding:100px 48px 80px}
.back{color:var(--garnet);text-decoration:none;font-size:12px;letter-spacing:2px;display:inline-block;margin-bottom:24px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px}
.img-wrap{position:sticky;top:100px;background:var(--floral);border:1px solid rgba(140,58,58,0.1)}
.img-wrap img{width:100%;height:450px;object-fit:cover;display:block}
.progress-bar{display:flex;padding:12px 16px;gap:8px;font-size:11px;letter-spacing:1px;color:var(--warm-gray)}
.progress-bar .active{color:var(--garnet);font-weight:500}
.info h1{font-family:var(--heading);font-size:32px;font-weight:400}
.info .desc{font-size:14px;color:var(--warm-gray);line-height:1.8;margin-top:16px}
.specs-table{margin-top:24px;width:100%}
.specs-table tr{border-bottom:1px solid rgba(140,58,58,0.08)}
.specs-table td{padding:10px 0;font-size:13px}
.specs-table td:first-child{color:var(--warm-gray);width:40%}
.price{font-family:var(--heading);font-size:28px;color:var(--garnet);margin-top:24px}
.commission-btn{display:block;width:100%;margin-top:24px;padding:16px;background:var(--garnet);color:var(--floral);border:none;font-family:var(--body);font-size:13px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:opacity 0.3s}
.commission-btn:hover{opacity:0.85}
@media(max-width:768px){.detail-grid{grid-template-columns:1fr}.img-wrap{position:static}.detail-page{padding:80px 24px 40px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">VAULT MAISON</a>
<div class="nav-links"><a href="listing.html">The Workbench</a><a href="index.html">Home</a></div></nav>
<div class="detail-page">
<a href="listing.html" class="back">← Back to Workbench</a>
<div class="detail-grid">
<div class="img-wrap"><img id="mainImg" src="" alt="">
<div class="progress-bar"><span class="active">1. Select Stones</span><span>→ 2. Choose Setting</span><span>→ 3. Review</span></div></div>
<div class="info" id="infoPanel"></div>
</div></div>
<footer class="footer"><p>© 2026 Vault Maison Atelier</p></footer>
<script>
const pid=new URLSearchParams(window.location.search).get('id')||'vm-001';
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const p=products.find(x=>x.id===pid)||products[0];
document.getElementById('mainImg').src=p.image;
document.getElementById('infoPanel').innerHTML=`
<h1>${p.name}</h1>
<p class="desc">${p.description}</p>
<table class="specs-table"><tr><td>Shape</td><td>${p.shape}</td></tr><tr><td>Carat</td><td>${p.carat}ct</td></tr><tr><td>Color</td><td>${p.color}</td></tr><tr><td>Clarity</td><td>${p.clarity}</td></tr><tr><td>Cut</td><td>${p.cut}</td></tr><tr><td>Origin</td><td>${p.origin}</td></tr><tr><td>Certification</td><td>${p.certified} — ${p.certNumber}</td></tr></table>
<div class="price">$${p.price.toLocaleString()}</div>
<button class="commission-btn" onclick="alert('Commission started. A master artisan will contact you within 48 hours to begin the design process.')">Add to Commission</button>`;
})
</script></body></html>
