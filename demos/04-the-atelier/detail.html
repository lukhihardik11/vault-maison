<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commission Detail — The Atelier</title>
  <link rel="stylesheet" href="../shared/css/luxury-foundation.css">
  <link rel="stylesheet" href="css/atelier.css">
</head>
<body>
  <div class="scroll-progress"></div>
  <nav class="luxury-nav">
    <a href="index.html" class="nav-logo">The Atelier</a>
    <div class="nav-links">
      <a href="listing.html">Commissions</a>
      <a href="#">Process</a>
      <a href="#">Artisans</a>
    </div>
  </nav>
  <div class="detail-layout">
    <div class="detail-image-col">
      <img id="detailImage" class="detail-main-image" src="" alt="Stone">
    </div>
    <div class="detail-info-col">
      <div class="detail-breadcrumb"><a href="index.html">Atelier</a> / <a href="listing.html">Stones</a> / <span id="detailBreadcrumb"></span></div>
      <h1 class="detail-title" id="detailTitle"></h1>

      <p class="detail-description" id="detailDesc"></p>
      <div class="detail-specs" id="detailSpecs"></div>
      <a href="#" class="detail-cta" onclick="alert('Commission request submitted. Your personal artisan will contact you within 24 hours.'); return false;">Begin Commission</a>
    </div>
  </div>
  <footer class="atl-footer"><p class="footer-text">The Atelier &mdash; Vault Maison</p></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
