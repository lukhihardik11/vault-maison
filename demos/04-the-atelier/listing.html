<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Workbench — Vault Maison Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/atelier.css">
<style>
.listing-header{padding:120px 48px 40px}
.listing-header h1{font-family:var(--heading);font-size:36px;font-weight:400}
.listing-header p{color:var(--warm-gray);font-size:13px;margin-top:8px}
.workbench-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding:0 48px 80px}
.ingredient-card{background:var(--floral);border:1px solid rgba(140,58,58,0.1);overflow:hidden;cursor:pointer;transition:border-color 0.3s,transform 0.3s;text-decoration:none;color:inherit;display:block}
.ingredient-card:hover{border-color:var(--garnet);transform:translateY(-4px)}
.ingredient-card img{width:100%;height:240px;object-fit:cover}
.ingredient-card .info{padding:20px}
.ingredient-card h3{font-family:var(--heading);font-size:20px;font-weight:400}
.ingredient-card .meta{font-size:12px;color:var(--warm-gray);margin-top:6px}
.ingredient-card .price-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.ingredient-card .price{font-family:var(--heading);font-size:18px;color:var(--garnet)}
.ingredient-card .add-btn{font-size:11px;letter-spacing:1px;color:var(--garnet);text-transform:uppercase}
.config-panel{position:fixed;right:-400px;top:0;bottom:0;width:400px;background:var(--floral);border-left:2px solid var(--garnet);z-index:200;padding:80px 32px 32px;transition:right 0.5s cubic-bezier(0.22,1,0.36,1);overflow-y:auto}
.config-panel.open{right:0}
.config-panel h2{font-family:var(--heading);font-size:24px;margin-bottom:16px}
.config-panel .close-btn{position:absolute;top:24px;right:24px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--dark)}
.config-panel .config-item{padding:12px 0;border-bottom:1px solid rgba(140,58,58,0.1)}
.config-panel .config-item img{width:60px;height:60px;object-fit:cover;display:inline-block;vertical-align:middle;margin-right:12px}
@media(max-width:768px){.workbench-grid{grid-template-columns:1fr;padding:0 24px 40px}.config-panel{width:100%}.listing-header{padding:100px 24px 24px}}
</style></head><body>
<nav class="nav"><a href="index.html" class="nav-brand">VAULT MAISON</a>
<div class="nav-links"><a href="listing.html">The Workbench</a><a href="index.html">Home</a></div></nav>
<div class="listing-header"><h1>The Workbench</h1><p>Select your ingredients. Click any stone to configure.</p></div>
<div class="workbench-grid" id="workbenchGrid"></div>
<div class="config-panel" id="configPanel">
<button class="close-btn" onclick="document.getElementById('configPanel').classList.remove('open')">×</button>
<h2>Add to Your Piece</h2>
<div id="configContent"></div>
</div>
<footer class="footer"><p>© 2026 Vault Maison Atelier</p></footer>
<script>
fetch('../shared/data/products.json').then(r=>r.json()).then(products=>{
const grid=document.getElementById('workbenchGrid');
products.forEach(p=>{
const card=document.createElement('div');card.className='ingredient-card';
card.innerHTML=`<img src="${p.image}" alt="${p.name}"><div class="info"><h3>${p.name}</h3><div class="meta">${p.shape} · ${p.carat}ct · ${p.color}/${p.clarity}</div><div class="price-row"><span class="price">$${p.price.toLocaleString()}</span><span class="add-btn">Configure →</span></div></div>`;
card.addEventListener('click',()=>{
document.getElementById('configContent').innerHTML=`
<div class="config-item"><img src="${p.image}" alt="${p.name}"><strong>${p.name}</strong><br><small>${p.shape} · ${p.carat}ct</small></div>
<div style="margin-top:20px"><label style="font-size:13px;display:block;margin-bottom:8px">Setting Type</label><select style="width:100%;padding:10px;border:1px solid #ddd;font-size:14px"><option>Prong (Classic)</option><option>Bezel</option><option>Pavé Halo</option><option>Cathedral</option></select></div>
<div style="margin-top:16px"><label style="font-size:13px;display:block;margin-bottom:8px">Metal</label><select style="width:100%;padding:10px;border:1px solid #ddd;font-size:14px"><option>18K White Gold</option><option>18K Yellow Gold</option><option>Platinum</option><option>18K Rose Gold</option></select></div>
<div style="margin-top:24px"><a href="detail.html?id=${p.id}" style="display:block;padding:14px;background:#8C3A3A;color:#FFFAF0;text-align:center;text-decoration:none;font-size:13px;letter-spacing:2px">ADD TO COMMISSION</a></div>`;
document.getElementById('configPanel').classList.add('open')});
grid.appendChild(card)})})
</script></body></html>
