<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault-Maison: 10 UI Concept Directions</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #F4F1EA; color: #4A4A4A; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            position: relative; 
            overflow: hidden; 
            background: linear-gradient(135deg, #F4F1EA 0%, #E8E5DE 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Decorative Background Elements */
        .bg-shape-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(138, 154, 91, 0.1) 0%, rgba(244, 241, 234, 0) 70%);
            z-index: 1;
        }
        .bg-shape-2 {
            position: absolute;
            bottom: -150px;
            right: -50px;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(44, 53, 57, 0.05) 0%, rgba(244, 241, 234, 0) 70%);
            z-index: 1;
        }

        /* Multi-pane structure */
        .pane-left {
            position: absolute;
            left: 15%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(192, 192, 192, 0.5);
            z-index: 2;
        }
        .pane-right {
            position: absolute;
            right: 15%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(192, 192, 192, 0.5);
            z-index: 2;
        }

        /* Main Content Block */
        .content-block {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            padding: 80px 100px;
            width: 80%;
            max-width: 1000px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        /* Typography */
        h1 {
            font-weight: 600;
            font-size: 64px;
            color: #2C3539;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }
        h2 {
            font-weight: 400;
            font-size: 32px;
            color: #8A9A5B;
            line-height: 1.4;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .date {
            font-weight: 400;
            font-size: 20px;
            color: #4A4A4A;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        
        /* Accent Line */
        .accent-line {
            width: 60px;
            height: 3px;
            background-color: #8A9A5B;
            margin: 0 auto 40px auto;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="bg-shape-1"></div>
        <div class="bg-shape-2"></div>
        
        <div class="pane-left"></div>
        <div class="pane-right"></div>

        <div class="content-block">
            <h1>Vault-Maison</h1>
            <div class="accent-line"></div>
            <h2>10 UI Concept Directions<br>Technology Framework Summary</h2>
            <div class="date">April 2026</div>
        </div>
    </div>
</body>
</html>
