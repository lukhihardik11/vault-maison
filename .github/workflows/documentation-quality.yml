name: Documentation Quality Control

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'research-data/**'

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Validate Markdown Structure
        run: |
          python scripts/documentation-generation/validate-doc.py --check-frontmatter docs/

      - name: AI Parsability Test
        run: |
          python scripts/documentation-generation/validate-doc.py --check-ai-structure docs/

      - name: Content Standards Check
        run: |
          python scripts/documentation-generation/validate-doc.py --check-content docs/

      - name: Link Validation
        run: |
          python scripts/documentation-generation/validate-doc.py --check-links docs/
